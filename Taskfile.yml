version: "3"

includes:
  android:
    taskfile: ./Taskfile.android.yml
    optional: false
  release:
    taskfile: ./Taskfile.release.yml
    optional: false

vars:
  BINARY: wt
  APP_NAME: WTranscribe

  WHISPER_ROOT: "{{.ROOT_DIR | toSlash}}/third_party/whisper.cpp"
  WHISPER_BUILD: "{{.WHISPER_ROOT}}/build"
  LLAMA_ROOT: "{{.ROOT_DIR | toSlash}}/third_party/llama.cpp"
  SHERPA_ROOT: "{{.ROOT_DIR | toSlash}}/third_party/sherpa-onnx"

  VERSION:
    sh: 'v="$(git describe --tags --abbrev=0 2>/dev/null | sed s/^v//)"; if [ -z "$v" ]; then v="0.0.0"; fi; echo "$v"'

  GIT_DATE:
    sh: 'if git describe --tags --exact-match HEAD >/dev/null 2>&1; then echo ""; else git log -1 --format=%cd --date=format:%Y-%m-%d 2>/dev/null || echo ""; fi'

  CUDA_ARCH: "61;75;80;86;89"

  CUDA_DIR:
    sh: |
      if [ "{{OS}}" != "windows" ]; then echo ""; exit 0; fi
      for d in "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA"/v*; do
        if [ -f "$d/bin/nvcc.exe" ]; then echo "$d"; exit 0; fi
      done
      echo ""

  LINUX_CUDA:
    sh: 'if [ "{{OS}}" = "linux" ] && command -v nvcc >/dev/null 2>&1; then echo 1; fi'

  MINGW_BIN:
    sh: |
      if [ "{{OS}}" != "windows" ]; then echo ""; exit 0; fi
      if gcc --version >/dev/null 2>&1; then echo ""; exit 0; fi
      for d in C:/msys64/mingw64/bin C:/msys64/ucrt64/bin C:/mingw64/bin; do
        if [ -f "$d/gcc.exe" ]; then echo "$d"; exit 0; fi
      done
      echo ""

  GCC_PATH:
    sh: |
      if command -v gcc >/dev/null 2>&1; then echo "gcc"; exit 0; fi
      for d in C:/msys64/mingw64/bin C:/msys64/ucrt64/bin C:/mingw64/bin; do
        if [ -f "$d/gcc.exe" ]; then echo "$d/gcc.exe"; exit 0; fi
      done
      echo "gcc"

  EXTRA_PATH:
    sh: |
      p=""
      [ -n "{{.MINGW_BIN}}" ] && p="{{.MINGW_BIN}}"
      if [ -n "{{.CUDA_DIR}}" ]; then
        if [ -n "$p" ]; then p="{{.WHISPER_BUILD}}/bin;$p"; else p="{{.WHISPER_BUILD}}/bin"; fi
      fi
      echo "$p"

  GO_ENV: 'export PATH="{{.WHISPER_BUILD}}/bin;{{.EXTRA_PATH}};$PATH" LD_LIBRARY_PATH="{{.WHISPER_BUILD}}/src:{{.WHISPER_BUILD}}/ggml/src:{{.WHISPER_BUILD}}/ggml/src/ggml-cuda${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"'

  CGO_LDFLAGS_LINUX: "-L{{.WHISPER_BUILD}}/src -L{{.WHISPER_BUILD}}/ggml/src -lwhisper -lggml -lggml-base -lggml-cpu -lm -lstdc++ -ldl -lpthread -Wl,-rpath,$ORIGIN"
  CGO_LDFLAGS_WIN_CUDA: "-L{{.WHISPER_BUILD}}/src -L{{.WHISPER_BUILD}}/ggml/src {{.WHISPER_BUILD}}/src/whisper.lib {{.WHISPER_BUILD}}/ggml/src/ggml.lib {{.WHISPER_BUILD}}/ggml/src/ggml-base.lib -lm -lstdc++ -fopenmp"
  CGO_LDFLAGS_WIN_CPU: "-L{{.WHISPER_ROOT}}/build/src -L{{.WHISPER_ROOT}}/build/ggml/src -lwhisper -lggml -lggml-base -lggml-cpu -lm -lstdc++ -fopenmp -static"

env:
  CGO_ENABLED: "1"
  CC: '{{if eq OS "linux"}}gcc{{else}}{{.GCC_PATH}}{{end}}'
  CGO_CFLAGS: "-I{{.WHISPER_ROOT}}/include -I{{.WHISPER_ROOT}}/ggml/include"
  CGO_LDFLAGS: '{{if eq OS "linux"}}{{.CGO_LDFLAGS_LINUX}}{{else if .CUDA_DIR}}{{.CGO_LDFLAGS_WIN_CUDA}}{{else}}{{.CGO_LDFLAGS_WIN_CPU}}{{end}}'
  CGO_LDFLAGS_ALLOW: '.*\.(lib|so|so\..*)'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: "Build binaries (+ installer/.deb). ONLY=cli|gui|android. android → APK."
    cmds:
      - task: android:apk
        if: '[ "{{.ONLY}}" = "android" ]'
      - task: "build:{{OS}}"
        vars: { ONLY: "{{.ONLY}}" }
        if: '[ "{{.ONLY}}" != "android" ]'

  install:
    desc: "Build + replace local install. TARGET=android pushes APK. QUICK=1 = redeploy bins only."
    cmds:
      - task: android:install
        if: '[ "{{.TARGET}}" = "android" ]'
      - task: "install:{{OS}}"
        vars: { QUICK: "{{.QUICK}}" }
        if: '[ "{{.TARGET}}" != "android" ]'

  test:
    desc: "Run tests. SHORT=1 skips CGo/model. INTEGRATION=1 runs diarization integration suite."
    cmds:
      - task: whisper-lib
        if: '[ -n "{{.SHORT}}" ] && [ "{{OS}}" = "linux" ]'
      - cmd: '{{if eq OS "linux"}}{{.GO_ENV}} && {{end}}export PATH="{{.EXTRA_PATH}};$PATH" && go test -v -short ./cmd/... ./internal/...'
        if: '[ -n "{{.SHORT}}" ]'
      - task: whisper-lib
        if: '[ -z "{{.SHORT}}" ]'
      - cmd: "{{.GO_ENV}} && go test -v -tags=integration ./internal/diarizer/..."
        if: '[ -n "{{.INTEGRATION}}" ]'
      - cmd: "{{.GO_ENV}} && go test -v ./cmd/... ./internal/..."
        if: '[ -z "{{.SHORT}}" ] && [ -z "{{.INTEGRATION}}" ]'

  lint:
    desc: "golangci-lint (falls back to go vet). FIX=1 also runs gofumpt. ANDROID=1 = NDK toolchain."
    cmds:
      - task: android:lint
        if: '[ -n "{{.ANDROID}}" ]'
      - cmd: |
          export PATH="{{.EXTRA_PATH}};$PATH"
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./cmd/... ./internal/...
          else
            echo "golangci-lint not found, falling back to go vet"
            go vet ./cmd/... ./internal/...
          fi
        if: '[ -z "{{.ANDROID}}" ]'
      - cmd: |
          if command -v gofumpt >/dev/null 2>&1; then
            gofumpt -w ./cmd/ ./internal/
          else
            gofmt -w ./cmd/ ./internal/
          fi
        if: '[ -n "{{.FIX}}" ]'

  clean:
    desc: "Remove dist/. DEEP=1 also clears whisper.cpp build."
    cmds:
      - rm -rf dist
      - cmd: rm -rf {{.WHISPER_BUILD}}
        if: '[ -n "{{.DEEP}}" ]'

  models:
    desc: "Model utilities. FETCH=samples (test samples) | FETCH=import (Linux/WSL from Windows mounts)."
    cmds:
      - task: models:samples
        if: '[ "{{.FETCH}}" = "samples" ]'
      - task: models:import
        if: '[ "{{.FETCH}}" = "import" ]'
      - cmd: |
          echo "Usage: task models FETCH=samples | FETCH=import"
          echo "Or:    task models:samples | task models:import"
          exit 1
        if: '[ "{{.FETCH}}" != "samples" ] && [ "{{.FETCH}}" != "import" ]'

  build:linux:
    deps: [whisper-lib, fetch-deps, fetch-vad]
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - bindings/**/*.go
      - scripts/diarize.py
      - Taskfile.yml
      - third_party/whisper.cpp/include/whisper.h
      - third_party/whisper.cpp/ggml/include/ggml.h
    generates:
      - dist/bin/{{.BINARY}}
      - dist/bin/{{.BINARY}}-gui
      - dist/bin/diarize.py
    cmds:
      - mkdir -p dist/bin
      - cmd: 'go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}}" -o dist/bin/{{.BINARY}} ./cmd/wt'
        if: '[ "{{.ONLY}}" != "gui" ]'
      - cmd: 'go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}}" -o dist/bin/{{.BINARY}}-gui ./cmd/wt-gui'
        if: '[ "{{.ONLY}}" != "cli" ]'
      - cmd: |
          dest="{{.ROOT_DIR | toSlash}}/dist/bin"
          mkdir -p "$dest"
          find "{{.WHISPER_BUILD}}/src" "{{.WHISPER_BUILD}}/ggml" \
            \( -name 'libwhisper.so*' -o -name 'libggml*.so*' \) \
            -exec cp -P {} "$dest/" \;
      - task: llama-cli-host
      - cmd: |
          src="{{.ROOT_DIR | toSlash}}/dist/llama"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin/llama"
          mkdir -p "$dest"
          if [ -f "$src/llama-cli" ]; then
            cp -f "$src"/llama-cli "$dest/"
            cp -f "$src"/*.so* "$dest/" 2>/dev/null || true
            chmod +x "$dest/llama-cli"
          fi
      - cp scripts/diarize.py "{{.ROOT_DIR | toSlash}}/dist/bin/diarize.py"
      - task: linux-deb
        if: '[ -z "{{.ONLY}}" ]'

  build:windows:
    deps: [whisper-lib, fetch-deps, fetch-vad]
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - bindings/**/*.go
      - scripts/diarize.py
      - Taskfile.yml
      - third_party/whisper.cpp/include/whisper.h
      - third_party/whisper.cpp/ggml/include/ggml.h
    generates:
      - dist/bin/{{.BINARY}}.exe
      - dist/bin/{{.BINARY}}-gui.exe
      - dist/bin/diarize.py
    cmds:
      - mkdir -p dist/bin
      - cmd: '{{.GO_ENV}} && go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}}" -o dist/bin/{{.BINARY}}.exe ./cmd/wt'
        if: '[ "{{.ONLY}}" != "gui" ]'
      - cmd: '{{.GO_ENV}} && go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}} -H windowsgui" -o dist/bin/{{.BINARY}}-gui.exe ./cmd/wt-gui'
        if: '[ "{{.ONLY}}" != "cli" ]'
      - cmd: |
          dlldir="{{.WHISPER_BUILD}}/bin"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin"
          mkdir -p "$dest"
          for f in "$dlldir"/whisper.dll "$dlldir"/ggml.dll "$dlldir"/ggml-base.dll; do
            cp "$f" "$dest/"
          done
          for f in "$dlldir"/ggml-cpu-*.dll "$dlldir"/ggml-cuda.dll; do
            [ -f "$f" ] && cp "$f" "$dest/"
          done
        if: '[ -n "{{.CUDA_DIR}}" ]'
      - task: llama-cli-host
      - cmd: |
          src="{{.ROOT_DIR | toSlash}}/dist/llama"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin/llama"
          mkdir -p "$dest"
          if [ -f "$src/llama-cli.exe" ]; then
            cp -f "$src"/llama-cli.exe "$dest/"
            cp -f "$src"/*.dll "$dest/" 2>/dev/null || true
          fi
      - cp scripts/diarize.py "{{.ROOT_DIR | toSlash}}/dist/bin/diarize.py"
      - task: installer-exe
        if: '[ -z "{{.ONLY}}" ]'

  install:linux:
    cmds:
      - task: build:linux
        vars: { ONLY: host }
        if: '[ -n "{{.QUICK}}" ]'
      - task: build
        if: '[ -z "{{.QUICK}}" ]'
      - cmd: 'bash scripts/install-host-linux.sh "{{.VERSION}}" "{{.BINARY}}" {{if .QUICK}}quick{{else}}full{{end}}'

  install:windows:
    cmds:
      - task: build:windows
        vars: { ONLY: host }
      - cmd: bash scripts/install-host-windows.sh "{{.VERSION}}" "{{.BINARY}}"

  fetch-vad:
    internal: true
    run: once
    desc: Download Silero VAD model for embedding into the binary
    sources: [scripts/fetch-vad.sh]
    generates: [internal/transcriber/assets/ggml-silero-v6.2.0.bin]
    cmds:
      - bash scripts/fetch-vad.sh

  whisper-lib:
    internal: true
    run: once
    status:
      - |
        if [ "{{OS}}" = "linux" ]; then
          test -f "{{.WHISPER_BUILD}}/src/libwhisper.so"
        elif [ -n "{{.CUDA_DIR}}" ]; then
          test -f "{{.WHISPER_BUILD}}/bin/whisper.dll"
        else
          test -f "{{.WHISPER_ROOT}}/build/src/libwhisper.a"
        fi
    cmds:
      - cmd: git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git {{.WHISPER_ROOT}}
        if: '[ ! -d "{{.WHISPER_ROOT}}" ]'
      - 'bash scripts/build-whisper.sh "{{.WHISPER_ROOT}}" "{{.WHISPER_BUILD}}" "{{.CUDA_DIR}}" "{{.CUDA_ARCH}}" "{{.ROOT_DIR | toSlash}}" "{{.LINUX_CUDA}}" "{{if eq OS "linux"}}1{{end}}"'

  fetch-deps:
    internal: true
    run: once
    cmds:
      - mkdir -p dist/deps
      - cmd: |
          if [ ! -f dist/deps/uv.exe ]; then
            echo "Downloading uv (windows)..."
            curl -sL "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" -o dist/deps/uv.zip
            powershell -NoProfile -Command "Expand-Archive -Force 'dist/deps/uv.zip' 'dist/deps/uv-tmp'"
            cp dist/deps/uv-tmp/uv.exe dist/deps/uv.exe
            rm -rf dist/deps/uv-tmp dist/deps/uv.zip
          fi
        platforms: [windows]
      - cmd: |
          if [ ! -f dist/deps/uv-linux ]; then
            echo "Downloading uv (linux)..."
            curl -sL "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz" -o dist/deps/uv.tgz
            tar -xzf dist/deps/uv.tgz -C dist/deps
            cp dist/deps/uv-x86_64-unknown-linux-gnu/uv dist/deps/uv-linux
            chmod +x dist/deps/uv-linux
            rm -rf dist/deps/uv-x86_64-unknown-linux-gnu dist/deps/uv.tgz
          fi
        platforms: [linux]

  installer-exe:
    internal: true
    platforms: [windows]
    vars:
      ISCC_PATH:
        sh: |
          for d in \
            "$LOCALAPPDATA/Programs/Inno Setup 6" \
            "C:/Program Files (x86)/Inno Setup 6" \
            "C:/Program Files/Inno Setup 6"; do
            if [ -f "$d/ISCC.exe" ]; then echo "$d/ISCC.exe"; exit 0; fi
          done
          echo ""
    sources:
      - dist/bin/**/*
      - scripts/installer.iss
    generates:
      - dist/wt-setup-{{.VERSION}}.exe
    cmds:
      - cmd: |
          if [ -z "{{.ISCC_PATH}}" ]; then
            echo "ERROR: Inno Setup not found. Install via: winget install JRSoftware.InnoSetup"
            exit 1
          fi
      - '"{{.ISCC_PATH}}" /DMyAppVersion={{.VERSION}} scripts/installer.iss'
      - "ls -l dist/wt-setup-{{.VERSION}}.exe"

  linux-deb:
    internal: true
    platforms: [linux]
    deps: [fetch-deps]
    cmds:
      - bash scripts/build-deb.sh "{{.VERSION}}" "{{.BINARY}}" "{{.ROOT_DIR | toSlash}}"

  llama-cli-host:
    internal: true
    run: once
    vars:
      HOST_DIR: "{{.ROOT_DIR | toSlash}}/dist/llama"
      HOST_BIN: '{{if eq OS "linux"}}llama-cli{{else}}llama-cli.exe{{end}}'
    status:
      - test -f "{{.HOST_DIR}}/{{.HOST_BIN}}"
    cmds:
      - cmd: |
          set -e
          mkdir -p "{{.HOST_DIR}}"
          tag=$(gh release list --repo ggml-org/llama.cpp --limit 1 --json tagName --jq '.[0].tagName')
          asset="llama-${tag}-bin-win-cpu-x64.zip"
          tmp="{{.ROOT_DIR | toSlash}}/dist/llama-tmp"
          rm -rf "$tmp" && mkdir -p "$tmp"
          gh release download "$tag" --repo ggml-org/llama.cpp --pattern "$asset" --dir "$tmp"
          unzip -o "$tmp/$asset" -d "$tmp/extracted" >/dev/null
          if [ -f "$tmp/extracted/llama-cli.exe" ]; then
            src="$tmp/extracted"
          else
            src=$(ls -d "$tmp/extracted"/*/ 2>/dev/null | head -1)
            src="${src%/}"
          fi
          cp -f "$src"/llama-cli.exe "{{.HOST_DIR}}/"
          cp -f "$src"/*.dll "{{.HOST_DIR}}/" 2>/dev/null || true
          rm -rf "$tmp"
          echo "Downloaded llama-cli ($tag) to {{.HOST_DIR}}"
        platforms: [windows]
      - cmd: |
          set -e
          mkdir -p "{{.HOST_DIR}}"
          tag=$(gh release list --repo ggml-org/llama.cpp --limit 1 --json tagName --jq '.[0].tagName')
          asset_tgz="llama-${tag}-bin-ubuntu-x64.tar.gz"
          asset_zip="llama-${tag}-bin-ubuntu-x64.zip"
          tmp=$(mktemp -d)
          if gh release download "$tag" --repo ggml-org/llama.cpp --pattern "$asset_tgz" --dir "$tmp" 2>/dev/null; then
            mkdir -p "$tmp/extracted"
            tar -xzf "$tmp/$asset_tgz" -C "$tmp/extracted"
          else
            gh release download "$tag" --repo ggml-org/llama.cpp --pattern "$asset_zip" --dir "$tmp"
            unzip -o "$tmp/$asset_zip" -d "$tmp/extracted" >/dev/null
          fi
          if [ -f "$tmp/extracted/llama-cli" ]; then
            src="$tmp/extracted"
          elif [ -f "$tmp/extracted/build/bin/llama-cli" ]; then
            src="$tmp/extracted/build/bin"
          else
            src=$(dirname "$(find "$tmp/extracted" -maxdepth 4 -type f -name llama-cli | head -1)")
          fi
          if [ -z "$src" ] || [ ! -f "$src/llama-cli" ]; then
            echo "ERROR: could not locate llama-cli in extracted archive" >&2
            ls -R "$tmp/extracted" >&2
            exit 1
          fi
          cp -f "$src"/llama-cli "{{.HOST_DIR}}/"
          cp -f "$src"/*.so* "{{.HOST_DIR}}/" 2>/dev/null || true
          chmod +x "{{.HOST_DIR}}/llama-cli"
          rm -rf "$tmp"
          echo "Downloaded llama-cli ($tag) to {{.HOST_DIR}}"
        platforms: [linux]

  models:samples:
    desc: "Download diarization test samples (sherpa wavs + voxconverse rttms)."
    cmds:
      - cmd: |
          set -e
          dest="{{.ROOT_DIR | toSlash}}/samples/diarization"
          mkdir -p "$dest/sherpa" "$dest/voxconverse"
          base="https://github.com/k2-fsa/sherpa-onnx/releases/download/speaker-segmentation-models"
          for f in 0-four-speakers-zh.wav 1-two-speakers-en.wav 2-two-speakers-en.wav 3-two-speakers-en.wav; do
            out="$dest/sherpa/$f"
            if [ -s "$out" ]; then echo "skip (exists): $f"; else echo "fetch: $f"; curl -fsSL --retry 3 -o "$out" "$base/$f"; fi
          done
          rttm_base="https://raw.githubusercontent.com/joonson/voxconverse/master/dev"
          for id in abjxc afjiv; do
            out="$dest/voxconverse/$id.rttm"
            if [ -s "$out" ]; then echo "skip (exists): $id.rttm"; else echo "fetch: $id.rttm"; curl -fsSL --retry 3 -o "$out" "$rttm_base/$id.rttm"; fi
          done

  models:import:
    desc: "Copy whisper + sherpa models from a Windows install (Linux/WSL only)."
    platforms: [linux]
    cmds:
      - cmd: |
          set -e
          dest="${XDG_CONFIG_HOME:-$HOME/.config}/{{.BINARY}}/models"
          mkdir -p "$dest"
          src_whisper="/mnt/c/Users/asolo/.whisper-go/models"
          src_sherpa="/mnt/c/Users/asolo/AppData/Local/wt/models"
          for f in ggml-large-v3-turbo.bin ggml-silero-v6.2.0.bin; do
            if [ -f "$src_whisper/$f" ] && [ ! -f "$dest/$f" ]; then
              echo "Copying $f..."
              cp "$src_whisper/$f" "$dest/$f"
            else
              echo "skip $f"
            fi
          done
          if [ -f "$src_sherpa/titanet_large.onnx" ] && [ ! -f "$dest/titanet_large.onnx" ]; then
            cp "$src_sherpa/titanet_large.onnx" "$dest/"
          fi
          if [ -d "$src_sherpa/sherpa-onnx-pyannote-segmentation-3-0" ] && [ ! -d "$dest/sherpa-onnx-pyannote-segmentation-3-0" ]; then
            cp -r "$src_sherpa/sherpa-onnx-pyannote-segmentation-3-0" "$dest/"
          fi
          echo "Models in $dest:"
          ls -lh "$dest"

  clean-comments:
    internal: true
    cmds:
      - go run ./scripts/clean-comments ./cmd ./internal ./bindings
      - cmd: |
          if command -v gofumpt >/dev/null 2>&1; then
            gofumpt -w ./cmd/ ./internal/
          else
            gofmt -w ./cmd/ ./internal/
          fi

  waydroid:
    desc: "(alias for android:waydroid)"
    cmds: [{ task: "android:waydroid", vars: { ACTION: "{{.ACTION}}" } }]

  android-test:
    desc: "(alias for android:test)"
    cmds: [{ task: "android:test", vars: { CLI_ARGS: "{{.CLI_ARGS}}" } }]
