version: '3'

vars:
  BINARY: wt
  APP_NAME: WTranscribe
  VERSION: '0.0.5'
  WHISPER_ROOT: '{{.ROOT_DIR | toSlash}}/third_party/whisper.cpp'
  WHISPER_BUILD: '{{.WHISPER_ROOT}}/build'
  LLAMA_ROOT: '{{.ROOT_DIR | toSlash}}/third_party/llama.cpp'
  SHERPA_ROOT: '{{.ROOT_DIR | toSlash}}/third_party/sherpa-onnx'

  IS_LINUX:
    sh: |
      case "$(uname -s 2>/dev/null)" in Linux) echo 1;; *) echo "";; esac
  IS_WINDOWS:
    sh: |
      case "$(uname -s 2>/dev/null)" in MINGW*|MSYS*|CYGWIN*|Windows*) echo 1;; *) echo "";; esac

  LINUX_CUDA:
    sh: |
      if [ "$(uname -s 2>/dev/null)" = "Linux" ] && command -v nvcc >/dev/null 2>&1; then echo 1; fi

  MINGW_BIN:
    sh: |
      if gcc --version >/dev/null 2>&1; then echo ""; exit 0; fi
      for d in C:/msys64/mingw64/bin C:/msys64/ucrt64/bin C:/mingw64/bin; do
        if [ -f "$d/gcc.exe" ]; then echo "$d"; exit 0; fi
      done
      echo ""

  CUDA_DIR:
    sh: |
      for d in "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA"/v*; do
        if [ -f "$d/bin/nvcc.exe" ]; then echo "$d"; exit 0; fi
      done
      echo ""

  CUDA_ARCH: '61;75;80;86;89'

  GIT_DATE:
    sh: 'if git describe --tags --exact-match HEAD >/dev/null 2>&1; then echo ""; else git log -1 --format=%cd --date=format:%y%m%d%H%M%S 2>/dev/null || echo ""; fi'

  GCC_PATH:
    sh: |
      if command -v gcc >/dev/null 2>&1; then echo "gcc"; exit 0; fi
      for d in C:/msys64/mingw64/bin C:/msys64/ucrt64/bin C:/mingw64/bin; do
        if [ -f "$d/gcc.exe" ]; then echo "$d/gcc.exe"; exit 0; fi
      done
      echo "gcc"

  NDK_ROOT:
    sh: echo "$LOCALAPPDATA/Android/Sdk/ndk/27.2.12479018"
  NDK_TOOLCHAIN: '{{.NDK_ROOT}}/toolchains/llvm/prebuilt/windows-x86_64'
  ANDROID_SYSROOT: '{{.NDK_TOOLCHAIN}}/sysroot'
  ANDROID_CC: '{{.NDK_TOOLCHAIN}}/bin/aarch64-linux-android28-clang'
  BUILD_TOOLS:
    sh: echo "$LOCALAPPDATA/Android/Sdk/build-tools/36.1.0"

  EXTRA_PATH:
    sh: |
      p=""
      mingw="{{.MINGW_BIN}}"
      if [ -n "$mingw" ]; then p="$mingw"; fi
      cuda="{{.CUDA_DIR}}"
      if [ -n "$cuda" ]; then
        if [ -n "$p" ]; then p="{{.WHISPER_BUILD}}/bin;$p"; else p="{{.WHISPER_BUILD}}/bin"; fi
      fi
      echo "$p"

  GO_ENV: 'export PATH="{{.WHISPER_BUILD}}/bin;{{.EXTRA_PATH}};$PATH" LD_LIBRARY_PATH="{{.WHISPER_BUILD}}/src:{{.WHISPER_BUILD}}/ggml/src:{{.WHISPER_BUILD}}/ggml/src/ggml-cuda${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"'

env:
  CGO_ENABLED: '1'
  CC: '{{if .IS_LINUX}}gcc{{else}}{{.GCC_PATH}}{{end}}'
  CGO_CFLAGS: '-I{{.WHISPER_ROOT}}/include -I{{.WHISPER_ROOT}}/ggml/include'
  CGO_LDFLAGS: '{{if .IS_LINUX}}-L{{.WHISPER_BUILD}}/src -L{{.WHISPER_BUILD}}/ggml/src -lwhisper -lggml -lggml-base -lggml-cpu -lm -lstdc++ -ldl -lpthread -Wl,-rpath,$ORIGIN{{else if .CUDA_DIR}}-L{{.WHISPER_BUILD}}/src -L{{.WHISPER_BUILD}}/ggml/src {{.WHISPER_BUILD}}/src/whisper.lib {{.WHISPER_BUILD}}/ggml/src/ggml.lib {{.WHISPER_BUILD}}/ggml/src/ggml-base.lib -lm -lstdc++ -fopenmp{{else}}-L{{.WHISPER_ROOT}}/build/src -L{{.WHISPER_ROOT}}/build/ggml/src -lwhisper -lggml -lggml-base -lggml-cpu -lm -lstdc++ -fopenmp -static{{end}}'
  CGO_LDFLAGS_ALLOW: '.*\.(lib|so|so\..*)'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # =========================================================================
  # User-facing tasks
  # =========================================================================

  build:
    desc: 'Build binaries + installer. ONLY=cli|gui|android to limit (cli/gui skip installer; android builds APK).'
    cmds:
      - task: android-apk
        if: '[ "{{.ONLY}}" = "android" ]'
      - task: _build-host
        vars:
          ONLY: '{{.ONLY}}'
        if: '[ "{{.ONLY}}" != "android" ]'

  install:
    desc: 'Build + replace local install. TARGET=android pushes APK to device and launches.'
    cmds:
      - task: _install-android
        if: '[ "{{.TARGET}}" = "android" ]'
      - task: _install-host
        if: '[ "{{.TARGET}}" != "android" ]'

  test:
    desc: 'Run tests. SHORT=1 skips CGo/model. INTEGRATION=1 runs diarization integration suite.'
    cmds:
      - cmd: 'export PATH="{{.EXTRA_PATH}};$PATH" && go test -v -short ./...'
        if: '[ -n "{{.SHORT}}" ]'
      - task: whisper-lib
        if: '[ -z "{{.SHORT}}" ]'
      - cmd: '{{.GO_ENV}} && go test -v -tags=integration ./internal/diarizer/...'
        if: '[ -n "{{.INTEGRATION}}" ]'
      - cmd: '{{.GO_ENV}} && go test -v ./...'
        if: '[ -z "{{.SHORT}}" ] && [ -z "{{.INTEGRATION}}" ]'

  lint:
    desc: 'Run golangci-lint (falls back to go vet). FIX=1 also runs gofumpt. ANDROID=1 uses NDK toolchain.'
    cmds:
      - task: _lint-android
        if: '[ -n "{{.ANDROID}}" ]'
      - cmd: |
          export PATH="{{.EXTRA_PATH}};$PATH"
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./cmd/... ./internal/...
          else
            echo "golangci-lint not found, falling back to go vet"
            go vet ./cmd/... ./internal/...
          fi
        if: '[ -z "{{.ANDROID}}" ]'
      - cmd: |
          if command -v gofumpt >/dev/null 2>&1; then
            gofumpt -w ./cmd/ ./internal/
          else
            gofmt -w ./cmd/ ./internal/
          fi
        if: '[ -n "{{.FIX}}" ]'

  release:
    desc: 'Bump → build → push tag → GH release + upload. ROLLING=1 skips bump and updates "rolling" prerelease.'
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: 'gh CLI not found. Install via: winget install GitHub.cli'
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: 'Working tree has uncommitted changes; commit or stash first.'
    cmds:
      - task: _release-rolling
        if: '[ -n "{{.ROLLING}}" ]'
      - task: _release-stable
        if: '[ -z "{{.ROLLING}}" ]'

  clean:
    desc: 'Remove dist/. DEEP=1 also clears whisper.cpp build.'
    cmds:
      - rm -rf dist
      - cmd: rm -rf {{.WHISPER_BUILD}}
        if: '[ -n "{{.DEEP}}" ]'

  models:
    desc: 'Model utilities. FETCH=samples downloads diarization test samples. FETCH=import copies models from Windows mounts (Linux/WSL).'
    cmds:
      - task: _fetch-samples
        if: '[ "{{.FETCH}}" = "samples" ]'
      - task: _models-import
        if: '[ "{{.FETCH}}" = "import" ]'
      - cmd: |
          echo "Usage: task models FETCH=samples | FETCH=import"
          exit 1
        if: '[ "{{.FETCH}}" != "samples" ] && [ "{{.FETCH}}" != "import" ]'

  # =========================================================================
  # Internal: host build pipeline
  # =========================================================================

  _build-host:
    internal: true
    deps: [whisper-lib, fetch-deps]
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - bindings/**/*.go
      - scripts/diarize.py
      - Taskfile.yml
      - third_party/whisper.cpp/include/whisper.h
      - third_party/whisper.cpp/ggml/include/ggml.h
    generates:
      - dist/bin/{{.BINARY}}{{if .IS_LINUX}}{{else}}.exe{{end}}
      - dist/bin/{{.BINARY}}-gui{{if .IS_LINUX}}{{else}}.exe{{end}}
      - dist/bin/diarize.py
    cmds:
      - mkdir -p dist/bin
      - cmd: '{{.GO_ENV}} && go build -ldflags "-X main.Version={{.VERSION}}" -o dist/bin/{{.BINARY}}.exe ./cmd/wt'
        if: '[ -z "{{.IS_LINUX}}" ] && [ "{{.ONLY}}" != "gui" ]'
      - cmd: '{{.GO_ENV}} && go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}} -H windowsgui" -o dist/bin/{{.BINARY}}-gui.exe ./cmd/wt-gui'
        if: '[ -z "{{.IS_LINUX}}" ] && [ "{{.ONLY}}" != "cli" ]'
      - cmd: |
          dlldir="{{.WHISPER_BUILD}}/bin"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin"
          mkdir -p "$dest"
          for f in "$dlldir"/whisper.dll "$dlldir"/ggml.dll "$dlldir"/ggml-base.dll; do
            cp "$f" "$dest/"
          done
          for f in "$dlldir"/ggml-cpu-*.dll "$dlldir"/ggml-cuda.dll; do
            [ -f "$f" ] && cp "$f" "$dest/"
          done
        if: '[ -z "{{.IS_LINUX}}" ] && [ -n "{{.CUDA_DIR}}" ]'
      - cmd: 'go build -ldflags "-X main.Version={{.VERSION}}" -o dist/bin/{{.BINARY}} ./cmd/wt'
        if: '[ -n "{{.IS_LINUX}}" ] && [ "{{.ONLY}}" != "gui" ]'
      - cmd: 'go build -ldflags "-X main.Version={{.VERSION}} -X main.BuildDate={{.GIT_DATE}}" -o dist/bin/{{.BINARY}}-gui ./cmd/wt-gui'
        if: '[ -n "{{.IS_LINUX}}" ] && [ "{{.ONLY}}" != "cli" ]'
      - cmd: |
          dest="{{.ROOT_DIR | toSlash}}/dist/bin"
          mkdir -p "$dest"
          find "{{.WHISPER_BUILD}}/src" "{{.WHISPER_BUILD}}/ggml" \
            \( -name 'libwhisper.so*' -o -name 'libggml*.so*' \) \
            -exec cp -P {} "$dest/" \;
        if: '[ -n "{{.IS_LINUX}}" ]'
      - task: llama-cli-host
      - cmd: |
          src="{{.ROOT_DIR | toSlash}}/dist/llama"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin/llama"
          mkdir -p "$dest"
          if [ -f "$src/llama-cli.exe" ]; then
            cp -f "$src"/llama-cli.exe "$dest/"
            cp -f "$src"/*.dll "$dest/" 2>/dev/null || true
          fi
          true
        if: '[ -z "{{.IS_LINUX}}" ]'
      - cmd: |
          src="{{.ROOT_DIR | toSlash}}/dist/llama"
          dest="{{.ROOT_DIR | toSlash}}/dist/bin/llama"
          mkdir -p "$dest"
          if [ -f "$src/llama-cli" ]; then
            cp -f "$src"/llama-cli "$dest/"
            cp -f "$src"/*.so* "$dest/" 2>/dev/null || true
            chmod +x "$dest/llama-cli"
          fi
          true
        if: '[ -n "{{.IS_LINUX}}" ]'
      - cp scripts/diarize.py "{{.ROOT_DIR | toSlash}}/dist/bin/diarize.py"
      - task: installer-exe
        if: '[ -z "{{.IS_LINUX}}" ] && [ -z "{{.ONLY}}" ]'
      - task: linux-deb
        if: '[ -n "{{.IS_LINUX}}" ] && [ -z "{{.ONLY}}" ]'

  _install-host:
    internal: true
    cmds:
      # Windows: build cli+gui only (skip installer-exe — install copies binaries directly).
      - task: _build-host
        vars:
          ONLY: host
        if: '[ -z "{{.IS_LINUX}}" ]'
      # Linux: full build incl. .deb (used by dpkg -i below).
      - task: build
        if: '[ -n "{{.IS_LINUX}}" ]'
      - cmd: |
          dest="$LOCALAPPDATA/{{.BINARY}}"
          if [ ! -d "$dest" ]; then
            echo "ERROR: $dest not found. Run installer first (dist/wt-setup-{{.VERSION}}.exe)."
            exit 1
          fi
          taskkill //F //IM {{.BINARY}}-gui.exe 2>/dev/null || true
          taskkill //F //IM {{.BINARY}}.exe 2>/dev/null || true
          python -c "import time; time.sleep(1)"
          cp -f dist/bin/*.exe "$dest/"
          cp -f dist/bin/*.dll "$dest/" 2>/dev/null || true
          cp -f dist/bin/diarize.py "$dest/" 2>/dev/null || true
          if [ -d dist/bin/llama ]; then
            mkdir -p "$dest/llama"
            cp -f dist/bin/llama/* "$dest/llama/" 2>/dev/null || true
          fi
          echo "Updated $dest"
          "$dest/{{.BINARY}}.exe" --version
        if: '[ -z "{{.IS_LINUX}}" ]'
      - cmd: |
          set -e
          deb="dist/wt_{{.VERSION}}_amd64.deb"
          if [ ! -f "$deb" ]; then
            echo "ERROR: $deb not found"; exit 1
          fi
          pkill -x {{.BINARY}}-gui 2>/dev/null || true
          pkill -x {{.BINARY}} 2>/dev/null || true
          sleep 0.3
          sudo dpkg -i "$deb"
          {{.BINARY}} --version
        if: '[ -n "{{.IS_LINUX}}" ]'

  _install-android:
    internal: true
    deps: [android-apk]
    cmds:
      - cmd: |
          export MSYS_NO_PATHCONV=1
          install_out=$(adb install -r -d dist/wt-{{.VERSION}}.apk 2>&1)
          echo "$install_out"
          case "$install_out" in
            *Success*) ;;
            *)
              echo "install failed; NOT auto-uninstalling (would wipe cache + models)."
              echo "Run: adb uninstall com.asolopovas.wtranscribe && task install TARGET=android"
              exit 1
              ;;
          esac
          adb logcat -c
          adb shell "am start -n com.asolopovas.wtranscribe/org.golang.app.GoNativeActivity"
          python -c "import time; time.sleep(2)"
          adb logcat -d | python -c "import sys,re,itertools;p=re.compile(r'wtranscribe|GoLog|dlopen|FATAL|panic|AndroidRuntime');sys.stdout.writelines(itertools.islice((l for l in sys.stdin if p.search(l)),30))"

  # =========================================================================
  # Internal: lint, test, models, release
  # =========================================================================

  _lint-android:
    internal: true
    cmds:
      - cmd: |
          if [ ! -d "{{.NDK_ROOT}}" ]; then
            echo "NDK not found at {{.NDK_ROOT}} — skipping android lint"
            exit 0
          fi
          export GOOS=android GOARCH=arm64 CGO_ENABLED=1
          export CC="{{.ANDROID_CC}}"
          export CGO_CFLAGS="--sysroot={{.ANDROID_SYSROOT}} -I{{.ANDROID_SYSROOT}}/usr/include"
          export CGO_LDFLAGS="--sysroot={{.ANDROID_SYSROOT}} -L{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/28"
          export CGO_LDFLAGS_ALLOW='.*'
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./cmd/wt-gui/... ./cmd/wt-test/... ./internal/...
          else
            echo "golangci-lint not found, falling back to go vet"
            go vet ./cmd/wt-gui/... ./cmd/wt-test/... ./internal/...
          fi

  _fetch-samples:
    internal: true
    cmds:
      - cmd: |
          set -e
          dest="{{.ROOT_DIR | toSlash}}/samples/diarization"
          mkdir -p "$dest/sherpa" "$dest/voxconverse"

          base="https://github.com/k2-fsa/sherpa-onnx/releases/download/speaker-segmentation-models"
          for f in 0-four-speakers-zh.wav 1-two-speakers-en.wav 2-two-speakers-en.wav 3-two-speakers-en.wav; do
            out="$dest/sherpa/$f"
            if [ -s "$out" ]; then
              echo "skip (exists): $f"
            else
              echo "fetch: $f"
              curl -fsSL --retry 3 -o "$out" "$base/$f"
            fi
          done

          rttm_base="https://raw.githubusercontent.com/joonson/voxconverse/master/dev"
          for id in abjxc afjiv; do
            out="$dest/voxconverse/$id.rttm"
            if [ -s "$out" ]; then
              echo "skip (exists): $id.rttm"
            else
              echo "fetch: $id.rttm"
              curl -fsSL --retry 3 -o "$out" "$rttm_base/$id.rttm"
            fi
          done

  _models-import:
    internal: true
    cmds:
      - cmd: |
          set -e
          dest="${XDG_CONFIG_HOME:-$HOME/.config}/{{.BINARY}}/models"
          mkdir -p "$dest"
          src_whisper="/mnt/c/Users/asolo/.whisper-go/models"
          src_sherpa="/mnt/c/Users/asolo/AppData/Local/wt/models"
          for f in ggml-large-v3-turbo.bin ggml-silero-v6.2.0.bin; do
            if [ -f "$src_whisper/$f" ] && [ ! -f "$dest/$f" ]; then
              echo "Copying $f..."
              cp "$src_whisper/$f" "$dest/$f"
            else
              echo "skip $f"
            fi
          done
          if [ -f "$src_sherpa/titanet_large.onnx" ] && [ ! -f "$dest/titanet_large.onnx" ]; then
            cp "$src_sherpa/titanet_large.onnx" "$dest/"
          fi
          if [ -d "$src_sherpa/sherpa-onnx-pyannote-segmentation-3-0" ] && [ ! -d "$dest/sherpa-onnx-pyannote-segmentation-3-0" ]; then
            cp -r "$src_sherpa/sherpa-onnx-pyannote-segmentation-3-0" "$dest/"
          fi
          echo "Models in $dest:"
          ls -lh "$dest"

  _release-stable:
    internal: true
    cmds:
      - task: bump
      - task: build
      - task: android-apk
        if: '[ -z "{{.IS_LINUX}}" ]'
      - |
        ver=$(powershell -NoProfile -Command "[Console]::Write((Select-String -Path Taskfile.yml -Pattern \"VERSION: '([^']+)'\" -CaseSensitive | Select-Object -First 1).Matches[0].Groups[1].Value)")
        C:/msys64/usr/bin/bash.exe scripts/release-publish.sh "$ver"

  _release-rolling:
    internal: true
    cmds:
      - task: build
      - task: android-apk
        if: '[ -z "{{.IS_LINUX}}" ]'
      - |
        set -e
        ver="{{.VERSION}}"
        sha=$(git rev-parse --short HEAD)
        branch=$(git rev-parse --abbrev-ref HEAD)
        [ "$branch" = "HEAD" ] && branch="main"
        tag="rolling"
        rolldir="dist/rolling"
        echo "Updating $tag to $sha (branch $branch, version $ver)"

        git push origin HEAD
        git tag -f "$tag" HEAD
        git push origin "$tag" --force

        rm -rf "$rolldir" && mkdir -p "$rolldir"
        artifacts=""
        if [ -f "dist/wt-setup-$ver.exe" ]; then
          cp "dist/wt-setup-$ver.exe" "$rolldir/wt-setup-$branch.exe"
          artifacts="$artifacts $rolldir/wt-setup-$branch.exe"
        fi
        if [ -f "dist/wt-$ver.apk" ]; then
          cp "dist/wt-$ver.apk" "$rolldir/wt-$branch.apk"
          artifacts="$artifacts $rolldir/wt-$branch.apk"
        fi
        if [ -f "dist/wt_${ver}_amd64.deb" ]; then
          cp "dist/wt_${ver}_amd64.deb" "$rolldir/wt-${branch}_amd64.deb"
          artifacts="$artifacts $rolldir/wt-${branch}_amd64.deb"
        fi
        if [ -z "$artifacts" ]; then
          echo "ERROR: no artifacts found to upload"; exit 1
        fi
        echo "Artifacts:$artifacts"

        if gh release view "$tag" >/dev/null 2>&1; then
          echo "Deleting existing $tag release..."
          gh release delete "$tag" --yes --cleanup-tag=false
        fi
        echo "Creating $tag release..."
        gh release create "$tag" \
          --title "Rolling ($branch @ $sha)" \
          --prerelease \
          --notes "Rolling build of $branch. Commit \`$sha\`, version $ver. Updated automatically; not a stable release."
        bash scripts/gh-release-upload.sh "$tag" $artifacts
        echo "Rolling release: https://github.com/asolopovas/wt/releases/tag/$tag"

  bump:
    internal: true
    vars:
      NEW_VERSION:
        sh: |
          cur="{{.VERSION}}"
          major="${cur%%.*}"
          rest="${cur#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"
          patch=$((patch + 1))
          if [ "$patch" -ge 10 ]; then patch=0; minor=$((minor + 1)); fi
          if [ "$minor" -ge 10 ]; then minor=0; major=$((major + 1)); fi
          echo "$major.$minor.$patch"
    cmds:
      - |
        cur="{{.VERSION}}"
        new="{{.NEW_VERSION}}"
        echo "Bumping version: $cur -> $new"
        powershell -NoProfile -Command "(Get-Content Taskfile.yml -Raw) -replace \"VERSION: '$cur'\",\"VERSION: '$new'\" | Set-Content Taskfile.yml -NoNewline"
      - task: install
      - |
        cur="{{.VERSION}}"
        new="{{.NEW_VERSION}}"
        git add Taskfile.yml
        git commit -m "Bump version $cur -> $new"


  clean-comments:
    internal: true
    cmds:
      - go run ./scripts/clean-comments ./cmd ./internal ./bindings
      - cmd: |
          if command -v gofumpt >/dev/null 2>&1; then
            gofumpt -w ./cmd/ ./internal/
          else
            gofmt -w ./cmd/ ./internal/
          fi

  # =========================================================================
  # Internal: native dependency builds
  # =========================================================================

  whisper-lib:
    internal: true
    run: once
    status:
      - |
        if [ -n "{{.IS_LINUX}}" ]; then
          test -f "{{.WHISPER_BUILD}}/src/libwhisper.so"
        elif [ -n "{{.CUDA_DIR}}" ]; then
          test -f "{{.WHISPER_BUILD}}/bin/whisper.dll"
        else
          test -f "{{.WHISPER_ROOT}}/build/src/libwhisper.a"
        fi
    cmds:
      - cmd: git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git {{.WHISPER_ROOT}}
        if: '[ ! -d "{{.WHISPER_ROOT}}" ]'
      - bash scripts/build-whisper.sh "{{.WHISPER_ROOT}}" "{{.WHISPER_BUILD}}" "{{.CUDA_DIR}}" "{{.CUDA_ARCH}}" "{{.ROOT_DIR | toSlash}}" "{{.LINUX_CUDA}}" "{{.IS_LINUX}}"

  fetch-deps:
    internal: true
    run: once
    cmds:
      - mkdir -p dist/deps
      - cmd: |
          if [ ! -f dist/deps/uv.exe ]; then
            echo "Downloading uv (windows)..."
            curl -sL "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" -o dist/deps/uv.zip
            powershell -NoProfile -Command "Expand-Archive -Force 'dist/deps/uv.zip' 'dist/deps/uv-tmp'"
            cp dist/deps/uv-tmp/uv.exe dist/deps/uv.exe
            rm -rf dist/deps/uv-tmp dist/deps/uv.zip
          fi
        if: '[ -z "{{.IS_LINUX}}" ]'
      - cmd: |
          if [ ! -f dist/deps/uv-linux ]; then
            echo "Downloading uv (linux)..."
            curl -sL "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz" -o dist/deps/uv.tgz
            tar -xzf dist/deps/uv.tgz -C dist/deps
            cp dist/deps/uv-x86_64-unknown-linux-gnu/uv dist/deps/uv-linux
            chmod +x dist/deps/uv-linux
            rm -rf dist/deps/uv-x86_64-unknown-linux-gnu dist/deps/uv.tgz
          fi
        if: '[ -n "{{.IS_LINUX}}" ]'

  installer-exe:
    internal: true
    vars:
      ISCC_PATH:
        sh: |
          for d in \
            "$LOCALAPPDATA/Programs/Inno Setup 6" \
            "C:/Program Files (x86)/Inno Setup 6" \
            "C:/Program Files/Inno Setup 6"; do
            if [ -f "$d/ISCC.exe" ]; then echo "$d/ISCC.exe"; exit 0; fi
          done
          echo ""
    sources:
      - dist/bin/**/*
      - scripts/installer.iss
    generates:
      - dist/wt-setup-{{.VERSION}}.exe
    cmds:
      - cmd: |
          if [ -z "{{.ISCC_PATH}}" ]; then
            echo "ERROR: Inno Setup not found. Install via: winget install JRSoftware.InnoSetup"
            exit 1
          fi
      - '"{{.ISCC_PATH}}" /DMyAppVersion={{.VERSION}} scripts/installer.iss'
      - 'ls -l dist/wt-setup-{{.VERSION}}.exe'

  linux-deb:
    internal: true
    deps: [fetch-deps]
    cmds:
      - cmd: bash scripts/build-deb.sh "{{.VERSION}}" "{{.BINARY}}" "{{.ROOT_DIR | toSlash}}"
        if: '[ -n "{{.IS_LINUX}}" ]'

  android-vulkan-headers:
    internal: true
    vars:
      VK_VER: '1.3.275'
      VK_INCLUDE: '{{.ANDROID_SYSROOT}}/usr/include/vulkan'
    status:
      - test -f "{{.VK_INCLUDE}}/vulkan.hpp"
      - test -f "{{.VK_INCLUDE}}/vulkan_hpp_macros.hpp"
    cmds:
      - cmd: |
          vk_include="{{.VK_INCLUDE}}"
          vk_ver="{{.VK_VER}}"
          echo "Downloading Vulkan C++ headers v${vk_ver}..."
          for f in vulkan.hpp vulkan_enums.hpp vulkan_funcs.hpp vulkan_handles.hpp \
                   vulkan_hash.hpp vulkan_raii.hpp vulkan_structs.hpp \
                   vulkan_to_string.hpp vulkan_format_traits.hpp \
                   vulkan_static_assertions.hpp vulkan_shared.hpp \
                   vulkan_hpp_macros.hpp vulkan_extension_inspection.hpp; do
            curl -sL "https://raw.githubusercontent.com/KhronosGroup/Vulkan-Hpp/v${vk_ver}/vulkan/$f" \
              -o "$vk_include/$f"
          done

  ffmpeg-android:
    internal: true
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/ffmpeg/ffmpeg-android-arm64"
    cmds:
      - cmd: |
          MSYS_BASH="C:/msys64/usr/bin/bash.exe"
          if [ ! -f "$MSYS_BASH" ]; then
            echo "ERROR: msys2 bash not found at $MSYS_BASH (install msys2 from https://www.msys2.org/)" >&2
            exit 1
          fi
          "$MSYS_BASH" -lc "export ANDROID_NDK_HOME='{{.NDK_ROOT}}'; export PATH='/mingw64/bin:/usr/bin:'\"\$PATH\"; cd '{{.ROOT_DIR | toSlash}}' && bash scripts/build-ffmpeg-android.sh"

  android-whisper-lib:
    internal: true
    deps: [android-vulkan-headers]
    vars:
      ANDROID_BUILD: '{{.WHISPER_ROOT}}/build-android-arm64'
    status:
      - test -f "{{.ANDROID_BUILD}}/src/libwhisper.a"
      - test -f "{{.ANDROID_BUILD}}/ggml/src/ggml-vulkan/libggml-vulkan.a"
    cmds:
      - cmd: git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git {{.WHISPER_ROOT}}
        if: '[ ! -d "{{.WHISPER_ROOT}}" ]'
      - cmd: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          cmake -B "{{.ANDROID_BUILD}}" -S "{{.WHISPER_ROOT}}" \
            -DCMAKE_MAKE_PROGRAM="C:/msys64/mingw64/bin/mingw32-make.exe" \
            -DCMAKE_TOOLCHAIN_FILE="{{.NDK_ROOT}}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DVulkan_INCLUDE_DIR="{{.ANDROID_SYSROOT}}/usr/include" \
            -DVulkan_LIBRARY="{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/28/libvulkan.so" \
            -DVulkan_GLSLC_EXECUTABLE="{{.NDK_ROOT}}/shader-tools/windows-x86_64/glslc.exe" \
            -DGGML_VULKAN_SHADERS_GEN_TOOLCHAIN="{{.ROOT_DIR | toSlash}}/scripts/host-mingw-toolchain.cmake" \
            -G "MinGW Makefiles"
          cmake --build "{{.ANDROID_BUILD}}" --config Release -j${NUMBER_OF_PROCESSORS:-$(nproc)}
          cp "{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/28/libvulkan.so" \
            "{{.ANDROID_BUILD}}/ggml/src/ggml-vulkan/libvulkan.so"

  llama-cli-host:
    internal: true
    vars:
      HOST_DIR: '{{.ROOT_DIR | toSlash}}/dist/llama'
      HOST_BIN: '{{if .IS_LINUX}}llama-cli{{else}}llama-cli.exe{{end}}'
    status:
      - test -f "{{.HOST_DIR}}/{{.HOST_BIN}}"
    cmds:
      - cmd: |
          set -e
          mkdir -p "{{.HOST_DIR}}"
          tag=$(gh release list --repo ggml-org/llama.cpp --limit 1 --json tagName --jq '.[0].tagName')
          asset="llama-${tag}-bin-win-cpu-x64.zip"
          tmp="{{.ROOT_DIR | toSlash}}/dist/llama-tmp"
          rm -rf "$tmp"
          mkdir -p "$tmp"
          gh release download "$tag" --repo ggml-org/llama.cpp --pattern "$asset" --dir "$tmp"
          unzip -o "$tmp/$asset" -d "$tmp/extracted" >/dev/null
          if [ -f "$tmp/extracted/llama-cli.exe" ]; then
            src="$tmp/extracted"
          else
            src=$(ls -d "$tmp/extracted"/*/ 2>/dev/null | head -1)
            src="${src%/}"
          fi
          cp -f "$src"/llama-cli.exe "{{.HOST_DIR}}/"
          cp -f "$src"/*.dll "{{.HOST_DIR}}/" 2>/dev/null || true
          rm -rf "$tmp"
          echo "Downloaded llama-cli ($tag) to {{.HOST_DIR}}"
        if: '[ -z "{{.IS_LINUX}}" ]'
      - cmd: |
          set -e
          mkdir -p "{{.HOST_DIR}}"
          tag=$(gh release list --repo ggml-org/llama.cpp --limit 1 --json tagName --jq '.[0].tagName')
          asset="llama-${tag}-bin-ubuntu-x64.zip"
          tmp=$(mktemp -d)
          gh release download "$tag" --repo ggml-org/llama.cpp --pattern "$asset" --dir "$tmp"
          unzip -o "$tmp/$asset" -d "$tmp/extracted" >/dev/null
          src=$(find "$tmp/extracted" -maxdepth 2 -type d | head -2 | tail -1)
          cp -f "$src"/llama-cli "{{.HOST_DIR}}/"
          cp -f "$src"/*.so* "{{.HOST_DIR}}/" 2>/dev/null || true
          chmod +x "{{.HOST_DIR}}/llama-cli"
          rm -rf "$tmp"
          echo "Downloaded llama-cli ($tag) to {{.HOST_DIR}}"
        if: '[ -n "{{.IS_LINUX}}" ]'

  android-llama-cli:
    internal: true
    vars:
      ANDROID_BUILD: '{{.LLAMA_ROOT}}/build-android-arm64'
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/llama/llama-cli-android-arm64"
    cmds:
      - cmd: git clone --depth 1 https://github.com/ggml-org/llama.cpp.git {{.LLAMA_ROOT}}
        if: '[ ! -d "{{.LLAMA_ROOT}}" ]'
      - cmd: |
          set -e
          export PATH="/c/msys64/mingw64/bin:$PATH"
          cmake -B "{{.ANDROID_BUILD}}" -S "{{.LLAMA_ROOT}}" \
            -DCMAKE_MAKE_PROGRAM="C:/msys64/mingw64/bin/mingw32-make.exe" \
            -DCMAKE_TOOLCHAIN_FILE="{{.NDK_ROOT}}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_VULKAN=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -G "MinGW Makefiles"
          cmake --build "{{.ANDROID_BUILD}}" --config Release --target llama-cli -j${NUMBER_OF_PROCESSORS:-$(nproc)}
          mkdir -p dist/llama
          cp "{{.ANDROID_BUILD}}/bin/llama-cli" dist/llama/llama-cli-android-arm64

  android-sherpa-bin:
    internal: true
    # sherpa-onnx's CMake won't cross-compile to Android directly: cmake/onnxruntime.cmake
    # only supports Linux/macOS/Windows hosts. Their upstream build-android-arm64-v8a.sh
    # works around it by pre-fetching onnxruntime android prebuilts and pointing the
    # build at them via SHERPA_ONNXRUNTIME_{LIB,INCLUDE}_DIR. We invoke that script via
    # msys2 bash (same pattern as ffmpeg-android).
    vars:
      BUILD_OUT: '{{.SHERPA_ROOT}}/build-android-arm64-v8a-static'
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-diar-android"
    cmds:
      - cmd: git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx.git {{.SHERPA_ROOT}}
        if: '[ ! -d "{{.SHERPA_ROOT}}" ]'
      - cmd: rm -rf "{{.SHERPA_ROOT}}/build-android-arm64"
      - cmd: |
          set -e
          MSYS_BASH="C:/msys64/usr/bin/bash.exe"
          if [ ! -f "$MSYS_BASH" ]; then
            echo "ERROR: msys2 bash not found at $MSYS_BASH (install msys2 from https://www.msys2.org/)" >&2
            exit 1
          fi
          "$MSYS_BASH" -lc "
            set -ex
            export ANDROID_NDK='{{.NDK_ROOT}}'
            export ANDROID_NDK_HOME='{{.NDK_ROOT}}'
            export BUILD_SHARED_LIBS=OFF
            export SHERPA_ONNX_ENABLE_BINARY=ON
            export SHERPA_ONNX_ENABLE_JNI=OFF
            export SHERPA_ONNX_ENABLE_TTS=OFF
            export SHERPA_ONNX_ENABLE_C_API=OFF
            export SHERPA_ONNX_ENABLE_SPEAKER_DIARIZATION=ON
            export SHERPA_ONNX_ANDROID_PLATFORM=android-28
            export PATH=/mingw64/bin:/usr/bin:\$PATH
            cd '{{.SHERPA_ROOT}}'
            bash build-android-arm64-v8a.sh
          "
          mkdir -p "{{.ROOT_DIR | toSlash}}/dist/sherpa"
          cp "{{.BUILD_OUT}}/install/bin/sherpa-onnx-offline-speaker-diarization" \
             "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-diar-android"

  android-apk:
    internal: true
    deps: [android-whisper-lib, ffmpeg-android, android-llama-cli, android-sherpa-bin]
    cmds:
      - python scripts/android-manifest.py "{{.VERSION}}" "{{.APP_NAME}}"
      - defer: rm -f cmd/wt-gui/AndroidManifest.xml
      - cmd: |
          export ANDROID_HOME="$LOCALAPPDATA/Android/Sdk"
          export ANDROID_NDK_HOME="{{.NDK_ROOT}}"
          unset CGO_CFLAGS CGO_LDFLAGS CGO_LDFLAGS_ALLOW CC
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            GIT_DATE=""
          else
            GIT_DATE="$(git log -1 --format=%cd --date=format:%y%m%d%H%M%S 2>/dev/null || echo '')"
          fi
          cat > cmd/wt-gui/buildinfo_generated.go <<EOF
          package main

          func init() {
              Version = "{{.VERSION}}"
              BuildDate = "$GIT_DATE"
          }
          EOF
          cat > internal/appinfo/appinfo_generated.go <<EOF
          package appinfo

          func init() {
              Name = "{{.APP_NAME}}"
              Version = "{{.VERSION}}"
              BuildDate = "$GIT_DATE"
          }
          EOF
          fyne package --os android/arm64 \
            --app-id com.asolopovas.wtranscribe \
            --name {{.APP_NAME}} \
            --app-version {{.VERSION}} \
            --icon "{{.ROOT_DIR | toSlash}}/winres/icon.png" \
            --src "{{.ROOT_DIR | toSlash}}/cmd/wt-gui"
      - defer: rm -f cmd/wt-gui/buildinfo_generated.go internal/appinfo/appinfo_generated.go
      - cmd: |
          set -e
          android_jar="$LOCALAPPDATA/Android/Sdk/platforms/android-36.1/android.jar"
          if [ ! -f "$android_jar" ]; then
            android_jar="$(ls -d $LOCALAPPDATA/Android/Sdk/platforms/android-* 2>/dev/null | sort -V | tail -1)/android.jar"
          fi
          rm -rf dist/svc-build
          mkdir -p dist/svc-build/classes
          javac -source 1.8 -target 1.8 -Xlint:-options \
            -bootclasspath "$android_jar" -classpath "$android_jar" \
            -d dist/svc-build/classes \
            scripts/android-service/com/asolopovas/wtranscribe/WtForegroundService.java
          "{{.BUILD_TOOLS}}/d8.bat" --min-api 24 \
            --output dist/svc-build \
            dist/svc-build/classes/com/asolopovas/wtranscribe/WtForegroundService.class
          test -f dist/svc-build/classes.dex
      - cmd: |
          set -e
          apk="cmd/wt-gui/{{.APP_NAME}}.apk"
          mkdir -p dist
          APK="$apk" \
          LIBCXX="{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/libc++_shared.so" \
          LIBOMP="{{.NDK_TOOLCHAIN}}/lib/clang/18/lib/linux/aarch64/libomp.so" \
          SHERPA_BIN="dist/sherpa/sherpa-diar-android" \
          SHERPA_SEG="dist/sherpa/models/sherpa-onnx-pyannote-segmentation-3-0/model.onnx" \
          SHERPA_EMB="dist/sherpa/models/titanet_large.onnx" \
          LLAMA_BIN="dist/llama/llama-cli-android-arm64" \
          FFMPEG_BIN="dist/ffmpeg/ffmpeg-android-arm64" \
          SVC_DEX="dist/svc-build/classes.dex" \
          OUT="dist/unsigned.apk" \
            python scripts/android-apk-patch.py
          "{{.BUILD_TOOLS}}/zipalign.exe" -f 4 dist/unsigned.apk dist/aligned.apk
          if [ ! -f "$USERPROFILE/.android/debug.keystore" ]; then
            keytool -genkey -v -keystore "$USERPROFILE/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          "{{.BUILD_TOOLS}}/apksigner.bat" sign \
            --ks "$USERPROFILE/.android/debug.keystore" \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out dist/wt-{{.VERSION}}.apk dist/aligned.apk
          rm -f dist/unsigned.apk dist/aligned.apk
          rm -f "$apk" "${apk}.idsig"

  android-test:
    internal: true
    deps: [android-whisper-lib]
    vars:
      NDK_CC: '{{.NDK_TOOLCHAIN}}/bin/aarch64-linux-android35-clang'
    cmds:
      - mkdir -p dist/bin
      - cmd: |
          unset CGO_CFLAGS CGO_LDFLAGS CGO_LDFLAGS_ALLOW CC
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          CC="{{.NDK_CC}}" \
          go build -tags android -o dist/bin/wt-test-arm64 ./cmd/wt-test
      - cmd: |
          export MSYS_NO_PATHCONV=1
          adb push dist/bin/wt-test-arm64 /data/local/tmp/wt-test
          adb push "{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/libc++_shared.so" /data/local/tmp/libc++_shared.so
          adb push "{{.NDK_TOOLCHAIN}}/lib/clang/18/lib/linux/aarch64/libomp.so" /data/local/tmp/libomp.so
          adb shell "chmod 755 /data/local/tmp/wt-test"
          adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=/data/local/tmp ./wt-test {{.CLI_ARGS}}"
