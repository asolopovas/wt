name: Release Windows installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Cache sherpa-onnx-win binaries
        uses: actions/cache@v4
        with:
          path: third_party/sherpa-onnx-win
          key: sherpa-onnx-win-${{ hashFiles('Taskfile.yml') }}

      - name: Cache llama.cpp host binaries
        uses: actions/cache@v4
        with:
          path: dist/llama
          key: llama-host-win-${{ hashFiles('Taskfile.yml') }}

      - name: Cache uv.exe
        uses: actions/cache@v4
        with:
          path: dist/deps
          key: uv-deps-win-${{ hashFiles('Taskfile.yml') }}

      - name: Compute version
        id: ver
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "version=${tag#v}" >> $GITHUB_OUTPUT

      - name: Build Windows binaries + installer
        run: task build:windows VERSION="${{ steps.ver.outputs.version }}"

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "dist/wt-setup-${{ steps.ver.outputs.version }}.exe" --clobber
