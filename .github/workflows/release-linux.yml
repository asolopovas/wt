name: Release Linux .deb

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake gcc g++ libgl1-mesa-dev xorg-dev \
            dpkg-dev fakeroot

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache whisper.cpp build
        uses: actions/cache@v4
        with:
          path: third_party/whisper.cpp
          key: whisper-cpp-linux-${{ hashFiles('Taskfile.yml') }}

      - name: Cache uv-linux
        uses: actions/cache@v4
        with:
          path: dist/deps
          key: uv-deps-linux-${{ hashFiles('Taskfile.yml') }}

      - name: Build Linux binaries
        run: task build

      - name: Build .deb
        run: task linux-deb

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          gh release upload "$tag" "dist/wt_${version}_amd64.deb" --clobber
