name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libgl1-mesa-dev xorg-dev

      - name: Vet
        run: go vet ./cmd/... ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: ./cmd/... ./internal/...

      - name: Build
        run: go build -o wt ./cmd/wt

      - name: Test (short)
        run: go test -short -count=1 ./cmd/... ./internal/...
