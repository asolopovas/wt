version: "3"

vars:
  NDK_ROOT:
    sh: echo "$LOCALAPPDATA/Android/Sdk/ndk/27.2.12479018"
  NDK_TOOLCHAIN: "{{.NDK_ROOT}}/toolchains/llvm/prebuilt/windows-x86_64"
  ANDROID_SYSROOT: "{{.NDK_TOOLCHAIN}}/sysroot"
  ANDROID_CC: "{{.NDK_TOOLCHAIN}}/bin/aarch64-linux-android28-clang"
  BUILD_TOOLS:
    sh: echo "$LOCALAPPDATA/Android/Sdk/build-tools/36.1.0"

tasks:
  apk:
    desc: "Build the signed Android APK (Windows host required)."
    deps:
      - ffmpeg
      - llama-cli
      - sherpa-bin
      - :fetch-vad
    cmds:
      - cmd: |
          export NDK_ROOT="{{.NDK_ROOT}}"
          export NDK_TOOLCHAIN="{{.NDK_TOOLCHAIN}}"
          export ANDROID_SYSROOT="{{.ANDROID_SYSROOT}}"
          export BUILD_TOOLS="{{.BUILD_TOOLS}}"
          export VERSION="{{.VERSION}}"
          export APP_NAME="{{.APP_NAME}}"
          export ROOT_DIR="{{.ROOT_DIR | toSlash}}"
          bash scripts/build-apk.sh

  install:
    desc: "Build APK + adb install + launch + scrape logcat."
    deps: [apk]
    cmds:
      - cmd: |
          export MSYS_NO_PATHCONV=1
          install_out=$(adb install -r -d dist/wt-{{.VERSION}}.apk 2>&1)
          echo "$install_out"
          case "$install_out" in
            *Success*) ;;
            *)
              echo "install failed; NOT auto-uninstalling (would wipe cache + models)."
              echo "Run: adb uninstall com.asolopovas.wtranscribe && task install TARGET=android"
              exit 1
              ;;
          esac
          adb logcat -c
          adb shell "am start -n com.asolopovas.wtranscribe/org.golang.app.GoNativeActivity"
          python -c "import time; time.sleep(2)"
          adb logcat -d | python -c "import sys,re,itertools;p=re.compile(r'wtranscribe|GoLog|dlopen|FATAL|panic|AndroidRuntime');sys.stdout.writelines(itertools.islice((l for l in sys.stdin if p.search(l)),30))"

  test:
    desc: "Build wt-test CLI for arm64, push to /data/local/tmp, run via adb. CLI_ARGS forwarded."
    vars:
      NDK_CC: "{{.NDK_TOOLCHAIN}}/bin/aarch64-linux-android35-clang"
    cmds:
      - mkdir -p dist/bin
      - cmd: |
          unset CGO_CFLAGS CGO_LDFLAGS CGO_LDFLAGS_ALLOW CC
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          CC="{{.NDK_CC}}" \
          go build -tags android -o dist/bin/wt-test-arm64 ./cmd/wt-test
      - cmd: |
          export MSYS_NO_PATHCONV=1
          adb push dist/bin/wt-test-arm64 /data/local/tmp/wt-test
          adb push "{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/libc++_shared.so" /data/local/tmp/libc++_shared.so
          adb push "{{.NDK_TOOLCHAIN}}/lib/clang/18/lib/linux/aarch64/libomp.so" /data/local/tmp/libomp.so
          adb shell "chmod 755 /data/local/tmp/wt-test"
          adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=/data/local/tmp ./wt-test {{.CLI_ARGS}}"

  lint:
    desc: "Lint with the Android NDK toolchain."
    cmds:
      - cmd: |
          if [ ! -d "{{.NDK_ROOT}}" ]; then
            echo "NDK not found at {{.NDK_ROOT}} — skipping android lint"
            exit 0
          fi
          export GOOS=android GOARCH=arm64 CGO_ENABLED=1
          export CC="{{.ANDROID_CC}}"
          export CGO_CFLAGS="--sysroot={{.ANDROID_SYSROOT}} -I{{.ANDROID_SYSROOT}}/usr/include"
          export CGO_LDFLAGS="--sysroot={{.ANDROID_SYSROOT}} -L{{.ANDROID_SYSROOT}}/usr/lib/aarch64-linux-android/28"
          export CGO_LDFLAGS_ALLOW='.*'
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./cmd/wt-gui/... ./cmd/wt-test/... ./internal/...
          else
            echo "golangci-lint not found, falling back to go vet"
            go vet ./cmd/wt-gui/... ./cmd/wt-test/... ./internal/...
          fi

  _disabled_vulkan_headers:
    internal: true
    run: once
    vars:
      VK_VER: "1.3.275"
      VK_INCLUDE: "{{.ANDROID_SYSROOT}}/usr/include/vulkan"
    status:
      - test -f "{{.VK_INCLUDE}}/vulkan.hpp"
      - test -f "{{.VK_INCLUDE}}/vulkan_hpp_macros.hpp"
    cmds:
      - cmd: |
          vk_include="{{.VK_INCLUDE}}"
          vk_ver="{{.VK_VER}}"
          echo "Downloading Vulkan C++ headers v${vk_ver}..."
          for f in vulkan.hpp vulkan_enums.hpp vulkan_funcs.hpp vulkan_handles.hpp \
                   vulkan_hash.hpp vulkan_raii.hpp vulkan_structs.hpp \
                   vulkan_to_string.hpp vulkan_format_traits.hpp \
                   vulkan_static_assertions.hpp vulkan_shared.hpp \
                   vulkan_hpp_macros.hpp vulkan_extension_inspection.hpp; do
            curl -sL "https://raw.githubusercontent.com/KhronosGroup/Vulkan-Hpp/v${vk_ver}/vulkan/$f" \
              -o "$vk_include/$f"
          done

  ffmpeg:
    internal: true
    run: once
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/ffmpeg/ffmpeg-android-arm64"
    cmds:
      - cmd: |
          MSYS_BASH="C:/msys64/usr/bin/bash.exe"
          if [ ! -f "$MSYS_BASH" ]; then
            echo "ERROR: msys2 bash not found at $MSYS_BASH (install msys2 from https://www.msys2.org/)" >&2
            exit 1
          fi
          "$MSYS_BASH" -lc "export ANDROID_NDK_HOME='{{.NDK_ROOT}}'; export PATH='/mingw64/bin:/usr/bin:'\"\$PATH\"; cd '{{.ROOT_DIR | toSlash}}' && bash scripts/build-ffmpeg-android.sh"


  llama-cli:
    internal: true
    run: once
    vars:
      ANDROID_BUILD: "{{.LLAMA_ROOT}}/build-android-arm64"
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/llama/llama-cli-android-arm64"
    cmds:
      - cmd: git clone --depth 1 https://github.com/ggml-org/llama.cpp.git {{.LLAMA_ROOT}}
        if: '[ ! -d "{{.LLAMA_ROOT}}" ]'
      - cmd: |
          set -e
          export PATH="/c/msys64/mingw64/bin:$PATH"
          cmake -B "{{.ANDROID_BUILD}}" -S "{{.LLAMA_ROOT}}" \
            -DCMAKE_MAKE_PROGRAM="C:/msys64/mingw64/bin/mingw32-make.exe" \
            -DCMAKE_TOOLCHAIN_FILE="{{.NDK_ROOT}}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_VULKAN=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -G "MinGW Makefiles"
          cmake --build "{{.ANDROID_BUILD}}" --config Release --target llama-cli -j${NUMBER_OF_PROCESSORS:-$(nproc)}
          mkdir -p dist/llama
          cp "{{.ANDROID_BUILD}}/bin/llama-cli" dist/llama/llama-cli-android-arm64

  sherpa-bin:
    internal: true
    run: once
    vars:
      BUILD_OUT: "{{.SHERPA_ROOT}}/build-android-arm64-v8a-static"
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-diar-android"
      - test -f "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-asr-android"
    cmds:
      - cmd: git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx.git {{.SHERPA_ROOT}}
        if: '[ ! -d "{{.SHERPA_ROOT}}" ]'
      - cmd: rm -rf "{{.SHERPA_ROOT}}/build-android-arm64"
      - cmd: |
          set -e
          MSYS_BASH="C:/msys64/usr/bin/bash.exe"
          if [ ! -f "$MSYS_BASH" ]; then
            echo "ERROR: msys2 bash not found at $MSYS_BASH (install msys2 from https://www.msys2.org/)" >&2
            exit 1
          fi
          "$MSYS_BASH" -lc "
            set -ex
            export PATH=/mingw64/bin:/usr/bin:\$PATH
            for tool in wget unzip make cmake; do
              command -v \$tool >/dev/null 2>&1 || pacman -S --noconfirm --needed \$tool
            done
            export ANDROID_NDK='{{.NDK_ROOT}}'
            export ANDROID_NDK_HOME='{{.NDK_ROOT}}'
            export BUILD_SHARED_LIBS=OFF
            export SHERPA_ONNX_ENABLE_BINARY=ON
            export SHERPA_ONNX_ENABLE_JNI=OFF
            export SHERPA_ONNX_ENABLE_TTS=OFF
            export SHERPA_ONNX_ENABLE_C_API=OFF
            export SHERPA_ONNX_ENABLE_SPEAKER_DIARIZATION=ON
            export SHERPA_ONNX_ANDROID_PLATFORM=android-21
            export CMAKE_GENERATOR='Unix Makefiles'
            cd '{{.SHERPA_ROOT}}'
            rm -rf build-android-arm64-v8a-static
            bash build-android-arm64-v8a.sh
          "
          mkdir -p "{{.ROOT_DIR | toSlash}}/dist/sherpa"
          cp "{{.BUILD_OUT}}/install/bin/sherpa-onnx-offline-speaker-diarization" \
             "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-diar-android"
          cp "{{.BUILD_OUT}}/install/bin/sherpa-onnx-offline" \
             "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-asr-android"

  sherpa-bin-nnapi:
    desc: "Build sherpa ASR with NNAPI provider (Exynos/Hexagon NPU). Shared onnxruntime."
    vars:
      BUILD_OUT: "{{.SHERPA_ROOT}}/build-android-arm64-v8a"
    status:
      - test -f "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-asr-android-nnapi"
      - test -f "{{.ROOT_DIR | toSlash}}/dist/sherpa/libonnxruntime.so"
    cmds:
      - cmd: git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx.git {{.SHERPA_ROOT}}
        if: '[ ! -d "{{.SHERPA_ROOT}}" ]'
      - cmd: |
          set -e
          MSYS_BASH="C:/msys64/usr/bin/bash.exe"
          if [ ! -f "$MSYS_BASH" ]; then
            echo "ERROR: msys2 bash not found at $MSYS_BASH" >&2
            exit 1
          fi
          "$MSYS_BASH" -lc "
            set -ex
            export PATH=/mingw64/bin:/usr/bin:\$PATH
            for tool in wget unzip make cmake; do
              command -v \$tool >/dev/null 2>&1 || pacman -S --noconfirm --needed \$tool
            done
            export ANDROID_NDK='{{.NDK_ROOT}}'
            export ANDROID_NDK_HOME='{{.NDK_ROOT}}'
            export BUILD_SHARED_LIBS=ON
            export SHERPA_ONNX_ENABLE_BINARY=ON
            export SHERPA_ONNX_ENABLE_JNI=OFF
            export SHERPA_ONNX_ENABLE_TTS=OFF
            export SHERPA_ONNX_ENABLE_C_API=OFF
            export SHERPA_ONNX_ENABLE_SPEAKER_DIARIZATION=OFF
            export SHERPA_ONNX_ANDROID_PLATFORM=android-27
            export CMAKE_GENERATOR='Unix Makefiles'
            cd '{{.SHERPA_ROOT}}'
            rm -rf build-android-arm64-v8a
            bash build-android-arm64-v8a.sh
          "
          mkdir -p "{{.ROOT_DIR | toSlash}}/dist/sherpa"
          cp "{{.BUILD_OUT}}/install/bin/sherpa-onnx-offline" \
             "{{.ROOT_DIR | toSlash}}/dist/sherpa/sherpa-asr-android-nnapi"
          cp "{{.BUILD_OUT}}/install/lib/libonnxruntime.so" \
             "{{.ROOT_DIR | toSlash}}/dist/sherpa/libonnxruntime.so"

  waydroid:
    desc: "Run APK in Waydroid LXC + libndk_translation. ACTION=start|install|run|logcat|sherpa|status|stop|all (default all). One-time setup: 'sudo bash scripts/waydroid-setup.sh'."
    cmds:
      - cmd: bash scripts/waydroid-run.sh {{.ACTION | default "all"}}
