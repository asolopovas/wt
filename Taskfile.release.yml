version: "3"

tasks:
  default:
    desc: "Default = dev release (no version bump). BUMP=1 → bump patch + stable tagged release."
    cmds:
      - task: stable
        if: '[ -n "{{.BUMP}}" ]'
      - task: dev
        if: '[ -z "{{.BUMP}}" ]'

  stable:
    desc: "Build everything + push tag + create GH release. BUMP=1 bumps patch first; otherwise HEAD must be on a vX.Y.Z tag."
    cmds:
      - task: bump
        if: '[ -n "{{.BUMP}}" ]'
      - task: stable:run

  stable:run:
    internal: true
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "gh CLI not found. Install via: winget install GitHub.cli"
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "Working tree has uncommitted changes; commit or stash first."
      - sh: "git describe --tags --exact-match HEAD >/dev/null 2>&1"
        msg: "HEAD is not on a release tag. Run `task release BUMP=1` (or `task release:bump`) first."
    vars:
      STABLE_VERSION:
        sh: 'git describe --tags --exact-match HEAD | sed s/^v//'
    cmds:
      - task: :build
        vars: { VERSION: "{{.STABLE_VERSION}}" }
      - task: :installer-exe
        vars: { VERSION: "{{.STABLE_VERSION}}" }
        platforms: [windows]
      - task: :linux-deb
        vars: { VERSION: "{{.STABLE_VERSION}}" }
        platforms: [linux]
      - task: :android:apk
        vars: { VERSION: "{{.STABLE_VERSION}}" }
      - cmd: '{{if eq OS "windows"}}C:/msys64/usr/bin/bash.exe{{else}}bash{{end}} scripts/release-publish.sh "{{.STABLE_VERSION}}"'

  dev:
    desc: "Dev release: build host + android (+ Windows VM if reachable) with version dev-YYYY-MM-DD-HH-MM-SS, publish to 'dev' prerelease tag."
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "gh CLI not found."
    vars:
      DEV_VERSION:
        sh: 'echo "dev-$(date +%Y-%m-%d-%H-%M-%S)"'
    cmds:
      - task: :build
        vars: { VERSION: "{{.DEV_VERSION}}", ONLY: host }
      - task: :linux-deb
        vars: { VERSION: "{{.DEV_VERSION}}" }
        platforms: [linux]
      - task: :installer-exe
        vars: { VERSION: "{{.DEV_VERSION}}" }
        platforms: [windows]
      - task: :android:apk
        vars: { VERSION: "{{.DEV_VERSION}}" }
      - task: windows-vm
        vars: { VERSION: "{{.DEV_VERSION}}" }
      - cmd: bash scripts/release-dev.sh "{{.DEV_VERSION}}"

  windows-vm:
    desc: "Build Windows installer inside ~/os/windows-vm via SSH alias 'windows-vm'; output copied to dist/."
    cmds:
      - cmd: |
          set -e
          ver="{{.VERSION}}"
          if ! ssh -o ConnectTimeout=5 -o BatchMode=yes windows-vm true 2>/dev/null; then
            echo "⚠  windows-vm SSH unreachable — skipping Windows build."
            echo "   One-time setup: cd ~/os/windows-vm && make rdp, then run shared/enable-ssh.ps1 elevated."
            exit 0
          fi
          echo "→ Building Windows artifacts in VM (version $ver)"
          ssh windows-vm bash -lc "'set -e; cd /c && { [ -d wt ] || git clone https://github.com/asolopovas/wt.git wt; }; cd /c/wt && git fetch --prune --force --tags origin && git reset --hard origin/main && rm -f dist/wt-setup-*.exe dist/bin/wt.exe dist/bin/wt-gui.exe && task build VERSION=$ver'"
          mkdir -p dist
          fname=$(ssh windows-vm 'ls /c/wt/dist/wt-setup-*.exe | head -1 | xargs -n1 basename')
          scp "windows-vm:/C:/wt/dist/$fname" dist/
          ls -lh "dist/$fname"

  bump:
    desc: "Auto-increment patch version + create tag. Pass NEW=X.Y.Z to override."
    vars:
      NEW:
        sh: |
          if [ -n "{{.NEW}}" ]; then echo "{{.NEW}}"; exit 0; fi
          cur="{{.VERSION}}"
          IFS=. read -r maj min pat <<< "$cur"
          pat=$((pat + 1))
          if [ "$pat" -ge 10 ]; then pat=0; min=$((min + 1)); fi
          if [ "$min" -ge 10 ]; then min=0; maj=$((maj + 1)); fi
          echo "$maj.$min.$pat"
    cmds:
      - cmd: |
          new="{{.NEW}}"
          if git rev-parse "v$new" >/dev/null 2>&1; then
            echo "Tag v$new already exists" >&2; exit 1
          fi
          echo "Tagging v$new"
          git tag "v$new"
